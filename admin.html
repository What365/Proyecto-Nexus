<!DOCTYPE html>
<html lang="es">
<head>
    <script>
    // BLOQUEO DE SEGURIDAD
    const passwordCorrecta = "NexusAdmin2024"; // <--- CAMBIA ESTA CONTRASEÑA

        alert("Clave incorrecta. No tienes permiso para estar aquí.");
        window.location.href = "index.html"; // Lo manda de regreso al inicio

    <meta charset="UTF-8">
    <title>Panel de Moderación | Nexus</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        h1 { color: #4A90E2; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .info { flex-grow: 1; }
        .tag { font-size: 0.7rem; font-weight: bold; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; margin-right: 10px; background: #eee; }
        .btn-check { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-left: 10px; font-weight: bold; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Panel de Moderadora 👑</h1>
        <p style="text-align: center;">Mensajes esperando aprobación:</p>
        <div id="lista-pendientes">Cargando mensajes...</div>
    </div>

    <script>
        // CONFIGURACIÓN (PON TUS DATOS AQUÍ)
        const SUPABASE_URL = 'https://lrmxnscjmvywjwersjpy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxybXhuc2NqbXZ5d2p3ZXJzanB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTU4NzQsImV4cCI6MjA5Mjg3MTg3NH0.j8JEDY9TimFbXtMMyEen22gegdF3eMsK8eJn3aW73xI';

        async function cargarPendientes() {
            const div = document.getElementById('lista-pendientes');
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/mensajes?aprobado=eq.false&order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const mensajes = await res.json();
                
                div.innerHTML = mensajes.length === 0 ? "<p style='text-align:center;'>No hay nada pendiente por ahora. ¡Todo al día!</p>" : "";

                mensajes.forEach(m => {
                    div.innerHTML += `
                        <div class="card">
                            <div class="info">
                                <span class="tag">${m.categoria}</span>
                                <p>${m.contenido}</p>
                            </div>
                            <div>
                                <button class="btn-check" onclick="aprobar(${m.id})">APROBAR ✅</button>
                                <button class="btn-delete" onclick="eliminar(${m.id})">BORRAR 🗑️</button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                div.innerHTML = "Error al conectar con la base de datos.";
            }
        }

        async function aprobar(id) {
            await fetch(`${SUPABASE_URL}/rest/v1/mensajes?id=eq.${id}`, {
                method: 'PATCH',
                headers: { 
                    'apikey': SUPABASE_KEY, 
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ aprobado: true })
            });
            cargarPendientes(); // Recarga la lista
        }

        async function eliminar(id) {
            if(confirm('¿Segura que quieres borrar este mensaje?')) {
                await fetch(`${SUPABASE_URL}/rest/v1/mensajes?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                cargarPendientes();
            }
        }

        window.onload = cargarPendientes;
    </script>
</body>
</html>
