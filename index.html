<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa; --accent: #ffb7c5; 
            --tips: #ffeaa7; --estudio: #d1fae5; --sugerencia: #e0e7ff;
            --text: #444;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Nav */
        nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: center; gap: 30px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
        nav a { text-decoration: none; color: #888; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; cursor: pointer; }
        nav a:hover { color: var(--accent); }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* Vistas */
        .view { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Home */
        .hero { text-align: center; padding: 40px 20px; }
        .hero h1 { font-size: 3.5rem; margin: 0; letter-spacing: -2px; color: #333; }
        .grid-home { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
        .card-topic { background: white; padding: 40px 20px; border-radius: 25px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #f0f0f0; }
        .card-topic:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }

        /* Foro e Hilos */
        .post-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .reply-box { margin-top: 15px; padding-left: 20px; border-left: 2px solid #eee; }
        .reply-item { font-size: 0.85rem; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 5px; }
        
        .input-mini { width: 100%; border: 1px solid #eee; padding: 10px; border-radius: 10px; font-family: inherit; font-size: 0.8rem; margin-top: 5px; box-sizing: border-box; }
        .btn-reply { background: var(--accent); color: white; border: none; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; margin-top: 5px; }

        /* Legado Collage */
        .collage-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; padding: 20px; }
        .post-it { width: 180px; min-height: 180px; padding: 20px; border-radius: 2px; box-shadow: 5px 5px 10px rgba(0,0,0,0.05); transform: rotate(-1deg); font-size: 0.9rem; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; color: #444; font-weight: 500; }
        .post-it:nth-child(even) { transform: rotate(2deg); }
        
        /* Botones */
        .btn-add-postit { background: #333; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-bottom: 30px; transition: 0.3s; }
        .btn-add-postit:hover { background: var(--accent); transform: scale(1.05); }
        .main-input { width: 100%; height: 100px; border: none; background: white; padding: 20px; border-radius: 20px; font-family: inherit; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 10px; box-sizing: border-box; }
        .btn-send { background: #333; color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <a onclick="showView('home')">Home</a>
    <a onclick="showView('legado')">Seniors Legacy</a>
</nav>

<div id="home" class="view active">
    <div class="hero">
        <h1>Nexus.</h1>
        <p>Talk soon, study hard.</p>
        <div class="grid-home">
            <div class="card-topic" onclick="openForo('Tips')" style="border-bottom: 5px solid var(--tips)"><h3>Tips</h3></div>
            <div class="card-topic" onclick="openForo('Estudio')" style="border-bottom: 5px solid var(--estudio)"><h3>Estudio</h3></div>
            <div class="card-topic" onclick="openForo('Sugerencia')" style="border-bottom: 5px solid var(--sugerencia)"><h3>Sugerencias</h3></div>
        </div>
    </div>
</div>

<div id="foro" class="view">
    <div class="container">
        <h2 id="foro-titulo">Foro</h2>
        <textarea id="mainInput" class="main-input" placeholder="Escribe tu pregunta o mensaje..."></textarea>
        <button class="btn-send" onclick="enviarMensaje()">Publicar</button>
        <div id="feed-foro" style="margin-top: 30px;"></div>
    </div>
</div>

<div id="legado" class="view">
    <div class="container" style="text-align: center;">
        <h2>Seniors Legacy ✨</h2>
        <p>Deja tu huella para las que vienen.</p>
        <button class="btn-add-postit" onclick="abrirModalPostit()">+ Dejar un Post-it</button>
        
        <div id="muro-legado" class="collage-container">
            </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://lrmxnscjmvywjwersjpy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxybXhuc2NqbXZ5d2p3ZXJzanB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTU4NzQsImV4cCI6MjA5Mjg3MTg3NH0.j8JEDY9TimFbXtMMyEen22gegdF3eMsK8eJn3aW73xI';
    let catActual = '';

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'legado') cargarLegado();
    }

    function openForo(cat) {
        catActual = cat;
        document.getElementById('foro-titulo').innerText = cat;
        showView('foro');
        cargarContenido();
    }

    // --- LÓGICA DE SUPABASE ---

    async function enviarMensaje(replyTo = null, inputId = 'mainInput') {
        const txt = document.getElementById(inputId).value;
        if(!txt.trim()) return;

        const payload = {
            contenido: txt,
            categoria: catActual,
            aprobado: false,
            parent_id: replyTo // Ahora usa la columna dedicada
        };

        await fetch(`${SUPABASE_URL}/rest/v1/mensajes`, {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        alert("¡Enviado! Aparecerá cuando la moderadora lo apruebe ✨");
        document.getElementById(inputId).value = "";
    }

    async function cargarContenido() {
        const feed = document.getElementById('feed-foro');
        feed.innerHTML = "Cargando hilos...";

        const res = await fetch(`${SUPABASE_URL}/rest/v1/mensajes?aprobado=eq.true&order=created_at.asc`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const todos = await res.json();

        // Filtramos mensajes que son PREGUNTAS (parent_id es null) de la categoría actual
        const principales = todos.filter(m => m.categoria === catActual && m.parent_id === null);
        
        feed.innerHTML = principales.length ? "" : "No hay mensajes aún en esta categoría.";
        
        principales.forEach(msg => {
            // Filtramos las respuestas que pertenecen a este ID
            const respuestas = todos.filter(r => r.parent_id === msg.id);
            let htmlRespuestas = respuestas.map(r => `<div class="reply-item">${r.contenido}</div>`).join('');

            feed.innerHTML += `
                <div class="post-card">
                    <p style="font-weight:600;">${msg.contenido}</p>
                    <div class="reply-box">
                        ${htmlRespuestas}
                        <div style="margin-top:10px;">
                            <input type="text" id="reply-${msg.id}" class="input-mini" placeholder="Escribe una respuesta...">
                            <button class="btn-reply" onclick="enviarMensaje(${msg.id}, 'reply-${msg.id}')">Responder</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // --- LÓGICA LEGADO (POST-ITS) ---

    async function abrirModalPostit() {
        const msg = prompt("Escribe tu legado para las próximas generaciones:");
        if(!msg) return;

        await fetch(`${SUPABASE_URL}/rest/v1/mensajes`, {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ contenido: msg, categoria: 'Legado', aprobado: false, parent_id: null })
        });
        alert("Tu post-it ha sido enviado al muro (esperando aprobación) ✨");
    }

    async function cargarLegado() {
        const muro = document.getElementById('muro-legado');
        muro.innerHTML = "Cargando el muro...";
        
        const res = await fetch(`${SUPABASE_URL}/rest/v1/mensajes?categoria=eq.Legado&aprobado=eq.true`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const postits = await res.json();
        
        const colores = ['#fff9c4', '#ffecb3', '#f8bbd0', '#e1f5fe', '#e8f5e9'];
        muro.innerHTML = postits.length ? "" : "El muro está vacío. ¡Sé la primera en dejar un mensaje!";
        
        postits.forEach((p, index) => {
            const col = colores[index % colores.length];
            muro.innerHTML += `<div class="post-it" style="background:${col}">${p.contenido}</div>`;
        });
    }

    window.onload = () => {
        if(window.location.hash === '#legado') showView('legado');
        // No cargamos legado aquí para no gastar recursos si no están en esa vista
    };
</script>
</body>
</html>
